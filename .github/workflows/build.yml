name: C CI Pipeline


on: [push, pull_request]

jobs:
  build:
    # GitHub'ın sunduğu sanal makinelerden birini seçin
    runs-on: ubuntu-latest
    
    steps:
    
    - uses: actions/checkout@v4
    
    
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential
        
    
    - name: Build
      run: make
      
    
    - name: Run Tests
      run: ./test_executable
