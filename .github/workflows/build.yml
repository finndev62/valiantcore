
name: C Build Matrix

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: x86_64
            target: x86_64-linux-gnu
            flags: ""
          - arch: i686
            target: i686-linux-gnu
            flags: "-m32"
    
    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang gcc-multilib

    - name: Compile
      run: |
        BUILD_DIR="/tmp/build_${{ matrix.arch }}"
        mkdir -p "$BUILD_DIR"
        
        # Projenin kök dizinini alıyoruz
        PROJECT_ROOT=$GITHUB_WORKSPACE
        
        find . -type f -name "*.c" | while read -r file; do
          filename=$(basename "$file" .c)
          
          # -I$PROJECT_ROOT parametresi, #include ile yazdığın yolların
          # projenin en başından itibaren aranmasını sağlar.
          clang -c "$file" -o "$BUILD_DIR/$filename.o" \
            --target=${{ matrix.target }} \
            ${{ matrix.flags }} \
            -I"$PROJECT_ROOT" \
            -ffreestanding -Wall -Wextra
        done

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: objects-${{ matrix.arch }}
        path: /tmp/build_${{ matrix.arch }}/*.o
